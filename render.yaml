services:
  - type: web
    name: srfm-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: srfm-db
          property: connectionString
      - key: JWT_SECRET
        generate: true
databases:
  - name: srfm-db
    plan: free
